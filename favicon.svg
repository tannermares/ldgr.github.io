<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Ldgr">
  <rect width="32" height="32" rx="8" fill="#4F7942"/>
  <!-- ledger page -->
  <rect x="9" y="6" width="16" height="20" rx="3" fill="#F5F6F1"/>
  <!-- binding rings on the spine -->
  <g fill="#4F7942">
    <circle cx="9" cy="10.5" r="1.6"/>
    <circle cx="9" cy="16" r="1.6"/>
    <circle cx="9" cy="21.5" r="1.6"/>
  </g>
  <!-- ruled lines -->
  <g stroke="#4F7942" stroke-width="1.8" stroke-linecap="round">
    <line x1="13" y1="10.5" x2="21.5" y2="10.5"/>
    <line x1="13" y1="16" x2="21.5" y2="16"/>
    <line x1="13" y1="21.5" x2="21.5" y2="21.5"/>
  </g>
</svg>
